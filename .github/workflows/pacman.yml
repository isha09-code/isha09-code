name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate pacman svg
        uses: huantt/pacman-contribution-graph@v1.0.0
        with:
          github-username: isha09-code
          token: ${{ secrets.GITHUB_TOKEN }}
          output-folder: dist

      - name: Deploy to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: false
