name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pacman graph
        uses: huantt/pacman-contribution-graph@v1.0.0
        with:
          github-username: isha09-code
          token: ${{ secrets.GITHUB_TOKEN }}
          output-folder: .

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacman-contribution-graph.svg pacman-contribution-graph-dark.svg || true
          git commit -m "Update pacman graph" || echo "Nothing to commit"
          git push origin output
